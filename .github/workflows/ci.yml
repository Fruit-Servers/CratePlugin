name: CI
on: [push]
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'
          cache: maven

      - name: Lint
        run: make lint

  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'
          cache: maven
      - name: Test with maven
        run: mvn -B test --file pom.xml

  build:
    needs: [lint, test]
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'
          cache: maven

      - name: Build with maven
        run: mvn -B package -DskipTests --file pom.xml

      - name: Copy build artifacts
        run: mkdir staging && cp bukkit/target/*.jar staging

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: staging
          retention-days: 3
